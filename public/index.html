<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Smart Thermostat Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h1>Smart Thermostat</h1>

  <section>
    <h2>Valvole</h2>
    <table id="valves-table" border="1">
      <thead>
        <tr>
          <th>ID</th>
          <th>Setpoint</th>
          <th>Heating</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section>
    <h2>Storico temperatura</h2>
    <select id="valve-select"></select>
    <canvas id="temp-chart" width="400" height="200"></canvas>
  </section>

  <script src="app.js"></script>
</body>
</html>
