<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>Automazione Domestica</title>

  <!-- Bootstrap CSS (fondamentale!) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Il tuo CSS opzionale -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

  <!-- HEADER FISSO -->
  <nav class="navbar navbar-dark bg-dark px-3 fixed-top">

    <button class="btn btn-outline-light me-3" data-bs-toggle="offcanvas" data-bs-target="#sidebarMenu">
      ☰
    </button>

    <span id="pageTitle" class="position-absolute top-50 start-50 translate-middle text-white fs-2"
          style="padding: 0;">
      Dashboard
    </span>

  </nav>

  <!-- SIDEBAR -->
  <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="sidebarMenu">
    <div class="offcanvas-header">
      <h5 class="offcanvas-title">Menu</h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body">
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a class="nav-link text-white" href="#dashboard" data-bs-dismiss="offcanvas">Dashboard</a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" href="#details" data-bs-dismiss="offcanvas">Dettagli</a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link text-white" href="#settings" data-bs-dismiss="offcanvas">Impostazioni</a>
        </li>
      </ul>
    </div>
  </div>

  <!-- CONTENUTO DELLA SPA -->
  <div id="app" class="container mt-5 pt-4"></div>

  <!-- Bootstrap JS (necessario per Offcanvas) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script SPA -->
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/details.js"></script>
  <script src="js/settings.js"></script>

</body>
</html>
